<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gerenciador SEI — COE/PMERJ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d1b2a;--navy2:#1b2d42;--navy3:#243447;--navy4:#2e4260;
  --gold:#c9a227;--gold2:#f0c040;
  --blue:#2c6fad;--blue2:#3a85cc;
  --green:#1e7a3e;--green2:#27ae60;
  --red:#a31515;--red2:#e74c3c;
  --amber:#7a4f00;--amber2:#e67e22;
  --purple:#5b2d8e;--purple2:#8e44ad;
  --gray:#4a5568;--gray2:#718096;
  --text:#e2e8f0;--text2:#a0aec0;
  --border:#2d4a6b;
  --sidebar-w:220px;
  --header-h:60px;
}
body{font-family:'Segoe UI',sans-serif;background:var(--navy);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden}
/* HEADER */
#header{height:var(--header-h);background:var(--navy2);border-bottom:2px solid var(--gold);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;z-index:100}
#header .logo{display:flex;align-items:center;gap:10px}
#header .logo .shield{font-size:28px}
#header .logo .title{font-size:16px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;line-height:1.2}
#header .logo .sub{font-size:11px;color:var(--text2)}
#header .spacer{flex:1}
#clock{font-size:13px;color:var(--gold2);font-weight:600;font-family:monospace;letter-spacing:1px}
#sync-status{font-size:11px;padding:3px 8px;border-radius:10px;background:var(--navy3);color:var(--text2)}
/* LAYOUT */
#layout{display:flex;flex:1;overflow:hidden}
/* SIDEBAR */
#sidebar{width:var(--sidebar-w);background:var(--navy2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sidebar-section{padding:12px 0}
.sidebar-section-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text2);padding:4px 16px 8px;border-bottom:1px solid var(--border);margin-bottom:4px}
.unit-btn{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border:none;background:none;color:var(--text2);width:100%;text-align:left;font-size:13px;transition:.15s;border-left:3px solid transparent}
.unit-btn:hover{background:var(--navy3);color:var(--text)}
.unit-btn.active{background:var(--navy3);color:var(--gold);border-left-color:var(--gold);font-weight:600}
.unit-btn .unit-icon{font-size:16px;width:20px;text-align:center}
.unit-btn .unit-badge{margin-left:auto;font-size:10px;background:var(--navy4);padding:2px 6px;border-radius:10px;color:var(--text2)}
.unit-btn.sub{padding-left:28px;font-size:12px}
.filter-group{padding:12px 14px}
.filter-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:6px;display:block}
.filter-select,.filter-input{width:100%;background:var(--navy3);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:6px;font-size:12px;outline:none}
.filter-select:focus,.filter-input:focus{border-color:var(--blue2)}
.filter-group+.filter-group{margin-top:4px}
/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
/* STATS */
#stats{display:flex;gap:12px;padding:16px 20px;background:var(--navy2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.stat-card{background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:12px 16px;min-width:120px;flex:1}
.stat-card .stat-num{font-size:28px;font-weight:700;line-height:1}
.stat-card .stat-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-top:4px}
.stat-card.total .stat-num{color:var(--blue2)}
.stat-card.andamento .stat-num{color:var(--gold2)}
.stat-card.aguardando .stat-num{color:var(--amber2)}
.stat-card.critico .stat-num{color:var(--red2)}
.stat-card.dup .stat-num{color:var(--purple2)}
.stat-card.enc .stat-num{color:var(--gray2)}
/* TOOLBAR */
#toolbar{display:flex;align-items:center;gap:10px;padding:10px 20px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
#toolbar .toolbar-left{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:wrap}
#search-box{background:var(--navy3);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:6px;font-size:13px;width:240px;outline:none}
#search-box:focus{border-color:var(--blue2)}
#toolbar .sel{background:var(--navy3);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:12px;outline:none}
.btn{padding:7px 14px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:.15s}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--blue2)}
.btn-gold{background:var(--gold);color:#000}.btn-gold:hover{background:var(--gold2)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:var(--red2)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}.btn-ghost:hover{border-color:var(--text2);color:var(--text)}
.btn-sm{padding:4px 10px;font-size:11px}
/* TABLE AREA */
#table-area{flex:1;overflow-y:auto;padding:16px 20px}
.year-group{margin-bottom:20px}
.year-header{font-size:13px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:2px;padding:6px 0 8px;border-bottom:2px solid var(--border);margin-bottom:8px;display:flex;align-items:center;gap:10px}
.year-header .year-count{font-size:11px;color:var(--text2);font-weight:400;background:var(--navy3);padding:2px 8px;border-radius:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--navy3);color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:8px 10px;text-align:left;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:5}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:.1s}
tbody tr:hover{background:var(--navy3)}
tbody tr.dup-row{border-left:3px solid var(--purple2)}
td{padding:8px 10px;vertical-align:middle}
td.sei-cell{font-family:monospace;font-size:11px;color:var(--gold2);white-space:nowrap}
td.desc-cell{max-width:320px}
td.desc-cell .desc-text{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
td.desc-cell .dup-badge{display:inline-block;font-size:9px;color:var(--purple2);background:rgba(142,68,173,.15);padding:1px 5px;border-radius:4px;margin-top:3px;border:1px solid var(--purple2)}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:700;white-space:nowrap}
.badge-andamento{background:rgba(44,111,173,.2);color:#64b5f6;border:1px solid rgba(44,111,173,.4)}
.badge-aguardando{background:rgba(122,79,0,.2);color:#ffb74d;border:1px solid rgba(230,126,34,.4)}
.badge-finalizado{background:rgba(30,122,62,.2);color:#66bb6a;border:1px solid rgba(39,174,96,.4)}
.badge-cancelado{background:rgba(163,21,21,.2);color:#ef9a9a;border:1px solid rgba(231,76,60,.4)}
.badge-baixado{background:rgba(74,85,104,.2);color:#90a4ae;border:1px solid rgba(74,85,104,.4)}
.badge-encerrado{background:rgba(91,45,142,.2);color:#ce93d8;border:1px solid rgba(142,68,173,.4)}
.badge-urg-baixa{background:rgba(30,122,62,.15);color:#81c784;border:1px solid rgba(39,174,96,.3)}
.badge-urg-normal{background:rgba(44,111,173,.15);color:#90caf9;border:1px solid rgba(44,111,173,.3)}
.badge-urg-alta{background:rgba(122,79,0,.15);color:#ffcc80;border:1px solid rgba(230,126,34,.3)}
.badge-urg-critica{background:rgba(163,21,21,.15);color:#ff8a80;border:1px solid rgba(231,76,60,.4)}
/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--navy2);border:1px solid var(--border);border-radius:12px;width:560px;max-width:95vw;max-height:90vh;display:flex;flex-direction:column}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700;color:var(--gold)}
.modal-close{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:0 4px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row.full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2)}
.form-control{background:var(--navy3);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:13px;outline:none;width:100%}
.form-control:focus{border-color:var(--blue2)}
textarea.form-control{resize:vertical;min-height:70px;font-family:inherit}
/* DRAWER */
#drawer{position:fixed;top:0;right:-500px;width:480px;height:100vh;background:var(--navy2);border-left:1px solid var(--border);z-index:300;transition:.3s;display:flex;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,.5)}
#drawer.open{right:0}
#drawer-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--navy3)}
#drawer-title{font-size:14px;font-weight:700;color:var(--gold)}
#drawer-body{padding:20px;overflow-y:auto;flex:1}
#drawer-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:space-between}
/* TOAST */
#toast-container{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:8px;font-size:13px;font-weight:600;animation:slideIn .3s ease;max-width:320px;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.toast.success{background:#1e7a3e;color:#fff;border-left:4px solid #27ae60}
.toast.error{background:#7a1515;color:#fff;border-left:4px solid #e74c3c}
.toast.info{background:#1a4a7a;color:#fff;border-left:4px solid #2c6fad}
.toast.warning{background:#6b4400;color:#fff;border-left:4px solid #e67e22}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--navy)}::-webkit-scrollbar-thumb{background:var(--navy4);border-radius:3px}
/* PRINT / responsive quick fix */
@media(max-width:768px){#sidebar{display:none}#stats{gap:8px}td.desc-cell .desc-text{-webkit-line-clamp:1}}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="logo">
    <span class="shield">🛡️</span>
    <div>
      <div class="title">Gerenciador SEI</div>
      <div class="sub">COE / PMERJ — SPAEI</div>
    </div>
  </div>
  <div class="spacer"></div>
  <span id="sync-status">● Local</span>
  &nbsp;
  <span id="clock">--:--:--</span>
</div>

<!-- LAYOUT -->
<div id="layout">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-section-title">Unidades</div>
      <button class="unit-btn active" onclick="filterUnit('TODAS')" id="btn-TODAS">
        <span class="unit-icon">📋</span>TODAS
        <span class="unit-badge" id="badge-TODAS">0</span>
      </button>
      <button class="unit-btn" onclick="filterUnit('COE')" id="btn-COE">
        <span class="unit-icon">⭐</span>COE
        <span class="unit-badge" id="badge-COE">0</span>
      </button>
      <button class="unit-btn sub" onclick="filterUnit('BPCHQ')" id="btn-BPCHQ">
        <span class="unit-icon">🛡</span>BPCHQ
        <span class="unit-badge" id="badge-BPCHQ">0</span>
      </button>
      <button class="unit-btn sub" onclick="filterUnit('BOPE')" id="btn-BOPE">
        <span class="unit-icon">⚡</span>BOPE
        <span class="unit-badge" id="badge-BOPE">0</span>
      </button>
      <button class="unit-btn sub" onclick="filterUnit('BTM')" id="btn-BTM">
        <span class="unit-icon">🏍</span>BTM
        <span class="unit-badge" id="badge-BTM">0</span>
      </button>
      <button class="unit-btn sub" onclick="filterUnit('GAM')" id="btn-GAM">
        <span class="unit-icon">🚁</span>GAM
        <span class="unit-badge" id="badge-GAM">0</span>
      </button>
      <button class="unit-btn sub" onclick="filterUnit('BAC')" id="btn-BAC">
        <span class="unit-icon">🐕</span>BAC
        <span class="unit-badge" id="badge-BAC">0</span>
      </button>
      <button class="unit-btn sub" onclick="filterUnit('CIESPP')" id="btn-CIESPP">
        <span class="unit-icon">🎯</span>CIESPP
        <span class="unit-badge" id="badge-CIESPP">0</span>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title">Filtros Rápidos</div>
      <div class="filter-group">
        <label class="filter-label">Status</label>
        <select class="filter-select" id="fil-status" onchange="renderTable()">
          <option value="">Todos</option>
          <option>Em Andamento</option>
          <option>Aguardando</option>
          <option>Finalizado</option>
          <option>Cancelado</option>
          <option>Baixado</option>
          <option>Encerrado</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Urgência</label>
        <select class="filter-select" id="fil-urg" onchange="renderTable()">
          <option value="">Todas</option>
          <option>Crítica</option>
          <option>Alta</option>
          <option>Normal</option>
          <option>Baixa</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Ano</label>
        <select class="filter-select" id="fil-ano" onchange="renderTable()">
          <option value="">Todos</option>
          <option>2025</option>
          <option>2024</option>
          <option>2023</option>
          <option>2022</option>
          <option>2021</option>
          <option>2020</option>
          <option>2019</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Responsável</label>
        <select class="filter-select" id="fil-resp" onchange="renderTable()">
          <option value="">Todos</option>
          <option>MAJ Emídio</option>
          <option>Sub Ten Valdeci</option>
          <option>ST Batista</option>
          <option>CB Brito</option>
          <option>SGT Aleixo</option>
          <option>SGT Almir</option>
          <option>SGT Vanessa</option>
          <option>CB Mesquita</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Duplicatas</label>
        <select class="filter-select" id="fil-dup" onchange="renderTable()">
          <option value="">Todos</option>
          <option value="sim">Apenas Duplicatas</option>
          <option value="nao">Sem Duplicatas</option>
        </select>
      </div>
      <div class="filter-group">
        <button class="btn btn-ghost" style="width:100%;justify-content:center" onclick="clearFilters()">↺ Limpar Filtros</button>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <!-- STATS -->
    <div id="stats">
      <div class="stat-card total"><div class="stat-num" id="s-total">0</div><div class="stat-label">Total de Processos</div></div>
      <div class="stat-card andamento"><div class="stat-num" id="s-and">0</div><div class="stat-label">Em Andamento</div></div>
      <div class="stat-card aguardando"><div class="stat-num" id="s-agu">0</div><div class="stat-label">Aguardando</div></div>
      <div class="stat-card critico"><div class="stat-num" id="s-crit">0</div><div class="stat-label">Críticos</div></div>
      <div class="stat-card dup"><div class="stat-num" id="s-dup">0</div><div class="stat-label">Duplicatas</div></div>
      <div class="stat-card enc"><div class="stat-num" id="s-enc">0</div><div class="stat-label">Encerrados/Cancelados</div></div>
    </div>

    <!-- TOOLBAR -->
    <div id="toolbar">
      <div class="toolbar-left">
        <input id="search-box" placeholder="🔍 Buscar SEI ou descrição..." oninput="renderTable()" spellcheck="false">
        <select class="sel" id="fil-pca" onchange="renderTable()">
          <option value="">PCA — Todos</option>
          <option value="2025">PCA 2025</option>
          <option value="2026">PCA 2026</option>
        </select>
      </div>
      <button class="btn btn-gold" onclick="openAddModal()">＋ Novo Processo</button>
      <button class="btn btn-ghost" onclick="exportCSV()">⬇ CSV</button>
    </div>

    <!-- TABLE AREA -->
    <div id="table-area">
      <div id="table-container"></div>
    </div>
  </div>
</div>

<!-- MODAL ADICIONAR -->
<div class="modal-backdrop" id="add-modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">➕ Novo Processo SEI</span>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row full"><div class="form-group">
        <label class="form-label">Nº SEI *</label>
        <input class="form-control" id="new-sei" placeholder="SEI-350014/000000/2025">
      </div></div>
      <div class="form-row full"><div class="form-group">
        <label class="form-label">Descrição *</label>
        <textarea class="form-control" id="new-desc" rows="3" placeholder="Descrição do processo..."></textarea>
      </div></div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Unidade</label>
          <select class="form-control" id="new-unidade">
            <option>COE</option><option>BPCHQ</option><option>BOPE</option>
            <option>BTM</option><option>GAM</option><option>BAC</option><option>CIESPP</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-control" id="new-status">
            <option>Em Andamento</option><option>Aguardando</option><option>Finalizado</option>
            <option>Cancelado</option><option>Baixado</option><option>Encerrado</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Urgência</label>
          <select class="form-control" id="new-urg">
            <option>Normal</option><option>Baixa</option><option>Alta</option><option>Crítica</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Responsável</label>
          <select class="form-control" id="new-resp">
            <option value="">— Sem responsável —</option>
            <option>MAJ Emídio</option><option>Sub Ten Valdeci</option>
            <option>ST Batista</option><option>CB Brito</option>
            <option>SGT Aleixo</option><option>SGT Almir</option>
            <option>SGT Vanessa</option><option>CB Mesquita</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Data Atualização</label>
          <input class="form-control" id="new-dataAtu" type="text" placeholder="DD/MM/AAAA">
        </div>
        <div class="form-group">
          <label class="form-label">Prazo</label>
          <input class="form-control" id="new-prazo" type="text" placeholder="DD/MM/AAAA">
        </div>
      </div>
      <div class="form-row full"><div class="form-group">
        <label class="form-label">Observações</label>
        <textarea class="form-control" id="new-obs" rows="2"></textarea>
      </div></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancelar</button>
      <button class="btn btn-gold" onclick="saveNewProcess()">💾 Salvar Processo</button>
    </div>
  </div>
</div>

<!-- DRAWER EDITAR -->
<div id="drawer">
  <div id="drawer-header">
    <span id="drawer-title">Editar Processo</span>
    <button class="modal-close" onclick="closeDrawer()">✕</button>
  </div>
  <div id="drawer-body">
    <input type="hidden" id="edit-id">
    <div class="form-row full"><div class="form-group">
      <label class="form-label">Nº SEI</label>
      <input class="form-control" id="edit-sei" readonly style="opacity:.7">
    </div></div>
    <div class="form-row full"><div class="form-group">
      <label class="form-label">Descrição</label>
      <textarea class="form-control" id="edit-desc" rows="4"></textarea>
    </div></div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-control" id="edit-status">
          <option>Em Andamento</option><option>Aguardando</option><option>Finalizado</option>
          <option>Cancelado</option><option>Baixado</option><option>Encerrado</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Urgência</label>
        <select class="form-control" id="edit-urg">

// ===== ESTADO =====
let DB = [];
let currentUnit = 'TODAS';

// ===== FIREBASE LOADER =====
function loadFirebase(cb){
  const s1=document.createElement('script');
  s1.src='https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js';
  s1.onload=()=>{
    const s2=document.createElement('script');
    s2.src='https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js';
    s2.onload=()=>{try{firebase.initializeApp(FB_CONFIG);fbDb=firebase.database();cb(true);}catch(e){cb(false);}};
    s2.onerror=()=>cb(false);
    document.head.appendChild(s2);
  };
  s1.onerror=()=>cb(false);
  document.head.appendChild(s1);
}

// ===== INIT =====
function init(){
  updateClock();setInterval(updateClock,1000);
  // Carregar localStorage primeiro
  const saved=localStorage.getItem('sei-gerenciador-v1');
  if(saved){try{DB=JSON.parse(saved);}catch(e){DB=[];};}
  if(!DB||DB.length===0){DB=[...SEED];saveLocal();}
  renderAll();
  // Tentar Firebase
  loadFirebase(ok=>{
    if(!ok){setSync('● Local');return;}
    fbReady=true;
    const ref=fbDb.ref(FB_PATH+'/processos');
    ref.once('value',snap=>{
      const val=snap.val();
      if(val&&typeof val==='object'){
        const arr=Object.values(val);
        if(arr.length>0){DB=arr;saveLocal();renderAll();setSync('🟢 Firebase');}
        else{pushAllToFb();}
      } else {pushAllToFb();}
      // listener em tempo real
      ref.on('value',s=>{
        const v=s.val();
        if(v&&typeof v==='object'){
          const a=Object.values(v);
          if(a.length>0){DB=a;saveLocal();renderAll();}
        }
      });
    });
  });
}

function pushAllToFb(){
  if(!fbReady||!fbDb)return;
  const ref=fbDb.ref(FB_PATH+'/processos');
  const obj={};DB.forEach(p=>{obj[p.id]=p;});
  ref.set(obj).then(()=>setSync('🟢 Firebase')).catch(()=>setSync('⚠ Erro FB'));
}
function saveLocal(){localStorage.setItem('sei-gerenciador-v1',JSON.stringify(DB));}
function saveFb(p){
  if(!fbReady||!fbDb)return;
  fbDb.ref(FB_PATH+'/processos/'+p.id).set(p).catch(e=>console.warn('FB err',e));
}
function deleteFb(id){
  if(!fbReady||!fbDb)return;
  fbDb.ref(FB_PATH+'/processos/'+id).remove().catch(e=>console.warn('FB err',e));
}
function setSync(txt){document.getElementById('sync-status').textContent=txt;}

// ===== CLOCK =====
function updateClock(){
  const now=new Date();
  document.getElementById('clock').textContent=
    now.toLocaleTimeString('pt-BR')+' | '+now.toLocaleDateString('pt-BR');
}

// ===== FILTROS =====
let filUnit='TODAS';
function filterUnit(u){
  filUnit=u;
  document.querySelectorAll('.unit-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+u)?.classList.add('active');
  renderTable();
}

function getFiltered(){
  const q=(document.getElementById('search-box')?.value||'').toLowerCase().trim();
  const fs=document.getElementById('fil-status')?.value||'';
  const fu=document.getElementById('fil-urg')?.value||'';
  const fa=document.getElementById('fil-ano')?.value||'';
  const fr=document.getElementById('fil-resp')?.value||'';
  const fd=document.getElementById('fil-dup')?.value||'';
  const fp=document.getElementById('fil-pca')?.value||'';
  return DB.filter(p=>{
    if(filUnit!=='TODAS'&&p.unidade!==filUnit)return false;
    if(fs&&p.status!==fs)return false;
    if(fu&&p.urgencia!==fu)return false;
    if(fa&&!p.sei.includes('/'+fa))return false;
    if(fr&&p.responsavel!==fr)return false;
    if(fd==='sim'&&!p.dup)return false;
    if(fd==='nao'&&p.dup)return false;
    if(fp&&!(p.desc.toLowerCase().includes('pca '+fp)||p.obs.toLowerCase().includes('pca '+fp)))return false;
    if(q&&!p.sei.toLowerCase().includes(q)&&!p.desc.toLowerCase().includes(q)&&!p.obs.toLowerCase().includes(q))return false;
    return true;
  });
}
function clearFilters(){
  ['fil-status','fil-urg','fil-ano','fil-resp','fil-dup','fil-pca'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';
  });
  document.getElementById('search-box').value='';
  filterUnit('TODAS');
}

// ===== STATS =====
function updateStats(filtered){
  document.getElementById('s-total').textContent=filtered.length;
  document.getElementById('s-and').textContent=filtered.filter(p=>p.status==='Em Andamento').length;
  document.getElementById('s-agu').textContent=filtered.filter(p=>p.status==='Aguardando').length;
  document.getElementById('s-crit').textContent=filtered.filter(p=>p.urgencia==='Crítica').length;
  document.getElementById('s-dup').textContent=filtered.filter(p=>p.dup).length;
  document.getElementById('s-enc').textContent=filtered.filter(p=>['Encerrado','Cancelado','Baixado','Finalizado'].includes(p.status)).length;
  // badges sidebar
  ['TODAS','COE','BPCHQ','BOPE','BTM','GAM','BAC','CIESPP'].forEach(u=>{
    const el=document.getElementById('badge-'+u);
    if(el)el.textContent=u==='TODAS'?DB.length:DB.filter(p=>p.unidade===u).length;
  });
}

// ===== BADGES =====
function statusBadge(s){
  const map={
    'Em Andamento':'badge-andamento','Aguardando':'badge-aguardando',
    'Finalizado':'badge-finalizado','Cancelado':'badge-cancelado',
    'Baixado':'badge-baixado','Encerrado':'badge-encerrado'
  };
  return `<span class="badge ${map[s]||''}">${s}</span>`;
}
function urgBadge(u){
  const map={
    'Baixa':'badge-urg-baixa','Normal':'badge-urg-normal',
    'Alta':'badge-urg-alta','Crítica':'badge-urg-critica'
  };
  return `<span class="badge ${map[u]||''}">${u}</span>`;
}

// ===== RENDER TABLE =====
function renderAll(){updateStats(getFiltered());renderTable();}
function renderTable(){
  const filtered=getFiltered();
  updateStats(filtered);
  // Agrupar por ano
  const grupos={};
  filtered.forEach(p=>{
    const m=p.sei.match(/\/(\d{4})$/);
    const ano=m?m[1]:'S/D';
    if(!grupos[ano])grupos[ano]=[];
    grupos[ano].push(p);
  });
  const anos=Object.keys(grupos).sort((a,b)=>b.localeCompare(a));
  let html='';
  if(filtered.length===0){
    html='<div class="empty-state"><div class="icon">📭</div><div>Nenhum processo encontrado.</div><div style="font-size:12px;margin-top:6px">Tente ajustar os filtros</div></div>';
  } else {
    anos.forEach(ano=>{
      const ps=grupos[ano];
      html+=`<div class="year-group">
        <div class="year-header">📅 ${ano} <span class="year-count">${ps.length} processo(s)</span></div>
        <table>
          <thead><tr>
            <th style="width:32px">#</th>
            <th style="width:200px">Nº SEI</th>
            <th>Descrição</th>
            <th style="width:120px">Status</th>
            <th style="width:80px">Urgência</th>
            <th style="width:110px">Responsável</th>
            <th style="width:90px">Data Atu.</th>
            <th style="width:80px">Ações</th>
          </tr></thead><tbody>`;
      ps.forEach((p,i)=>{
        html+=`<tr class="${p.dup?'dup-row':''}" id="row-${p.id}">
          <td style="color:var(--text2);font-size:11px">${i+1}</td>
          <td class="sei-cell">${escHtml(p.sei)}</td>
          <td class="desc-cell">
            <div class="desc-text">${escHtml(p.desc)}</div>
            ${p.dup?'<span class="dup-badge">⚠ DUPLICATA</span>':''}
            ${p.obs?`<div style="font-size:10px;color:var(--text2);margin-top:2px">${escHtml(p.obs.substring(0,60))}${p.obs.length>60?'...':''}</div>`:''}
          </td>
          <td>${statusBadge(p.status)}</td>
          <td>${urgBadge(p.urgencia)}</td>
          <td style="font-size:11px;color:var(--text2)">${escHtml(p.responsavel||'—')}</td>
          <td style="font-size:11px;color:var(--text2)">${escHtml(p.dataAtu||'—')}</td>
          <td><button class="btn btn-ghost btn-sm" onclick="openEdit('${p.id}')">✏</button></td>
        </tr>`;
      });
      html+='</tbody></table></div>';
    });
  }
  document.getElementById('table-container').innerHTML=html;
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ===== ADD MODAL =====
function openAddModal(){document.getElementById('add-modal').style.display='flex';}
function closeAddModal(){document.getElementById('add-modal').style.display='none';}
function saveNewProcess(){
  const sei=document.getElementById('new-sei').value.trim();
  const desc=document.getElementById('new-desc').value.trim();
  if(!sei||!desc){toast('Preencha Nº SEI e Descrição.','error');return;}
  const existing=DB.find(p=>p.sei===sei);
  const isdup=!!existing;
  const newP={
    id:'p'+Date.now(),
    sei,desc,
    unidade:document.getElementById('new-unidade').value,
    status:document.getElementById('new-status').value,
    urgencia:document.getElementById('new-urg').value,
    responsavel:document.getElementById('new-resp').value,
    dataAtu:document.getElementById('new-dataAtu').value,
    prazo:document.getElementById('new-prazo').value,
    obs:document.getElementById('new-obs').value,
    dup:isdup,
    dupDe:isdup?sei:''
  };
  DB.push(newP);saveLocal();saveFb(newP);
  if(isdup)toast('Processo adicionado com alerta de DUPLICATA!','warning');
  else toast('Processo adicionado com sucesso!','success');
  closeAddModal();
  ['sei','desc','dataAtu','prazo','obs'].forEach(f=>{const el=document.getElementById('new-'+f);if(el)el.value='';});
  renderAll();
}

// ===== EDIT DRAWER =====
function openEdit(id){
  const p=DB.find(x=>x.id===id);if(!p)return;
  document.getElementById('edit-id').value=p.id;
  document.getElementById('edit-sei').value=p.sei;
  document.getElementById('edit-desc').value=p.desc;
  document.getElementById('edit-status').value=p.status;
  document.getElementById('edit-urg').value=p.urgencia;
  document.getElementById('edit-resp').value=p.responsavel||'';
  document.getElementById('edit-unidade').value=p.unidade;
  document.getElementById('edit-dataAtu').value=p.dataAtu||'';
  document.getElementById('edit-prazo').value=p.prazo||'';
  document.getElementById('edit-obs').value=p.obs||'';
  document.getElementById('edit-dup').checked=!!p.dup;
  document.getElementById('drawer-title').textContent='✏ '+p.sei;
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');}
function saveEdit(){
  const id=document.getElementById('edit-id').value;
  const idx=DB.findIndex(p=>p.id===id);if(idx<0)return;
  DB[idx]={...DB[idx],
    desc:document.getElementById('edit-desc').value,
    status:document.getElementById('edit-status').value,
    urgencia:document.getElementById('edit-urg').value,
    responsavel:document.getElementById('edit-resp').value,
    unidade:document.getElementById('edit-unidade').value,
    dataAtu:document.getElementById('edit-dataAtu').value,
    prazo:document.getElementById('edit-prazo').value,
    obs:document.getElementById('edit-obs').value,
    dup:document.getElementById('edit-dup').checked
  };
  saveLocal();saveFb(DB[idx]);
  toast('Alterações salvas!','success');closeDrawer();renderAll();
}
function cancelProcess(){
  const id=document.getElementById('edit-id').value;
  const idx=DB.findIndex(p=>p.id===id);if(idx<0)return;
  if(!confirm('Cancelar este processo?'))return;
  DB[idx].status='Cancelado';saveLocal();saveFb(DB[idx]);
  toast('Processo cancelado.','info');closeDrawer();renderAll();
}

// ===== EXPORT CSV =====
function exportCSV(){
  const filtered=getFiltered();
  const lines=['ID,SEI,Descrição,Unidade,Status,Urgência,Responsável,Data Atu.,Prazo,Observações,Duplicata'];
  filtered.forEach(p=>{
    lines.push([p.id,p.sei,'"'+p.desc.replace(/"/g,'""')+'"',p.unidade,p.status,p.urgencia,p.responsavel,p.dataAtu,p.prazo,'"'+p.obs.replace(/"/g,'""')+'"',p.dup?'Sim':'Não'].join(','));
  });
  const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='SEI_COE_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  toast('CSV exportado com '+filtered.length+' registros.','success');
}

// ===== TOAST =====
function toast(msg,type='info'){
  const div=document.createElement('div');
  div.className='toast '+type;div.textContent=msg;
  document.getElementById('toast-container').appendChild(div);
  setTimeout(()=>div.remove(),4000);
}

// ===== KEYBOARD =====
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeAddModal();closeDrawer();}
});

// ===== START =====
init();
</script>
